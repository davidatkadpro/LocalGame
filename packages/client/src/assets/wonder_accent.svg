<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Team-colour accent: tinted with the player's colour. -->
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cccccc"/>
    </linearGradient>
  </defs>
  <!-- twin pennants flying from the dome finial -->
  <polygon points="51,7 70,11 51,15" fill="url(#acc)"/>
  <polygon points="49,7 30,11 49,15" fill="url(#acc)" opacity="0.85"/>
</svg>
