    <linearGradient id="acc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c8c8c8"/>
    </linearGradient>
  </defs>
  <!-- cap -->
  <path d="M33 33 a17 17 0 0 1 34 0 q-17 -11 -34 0Z" fill="url(#acc)"/>
  <!-- belt -->
