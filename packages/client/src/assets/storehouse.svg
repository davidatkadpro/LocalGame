<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Neutral base: an open-fronted granary with stacked crates/sacks.
       Pennant is a separate accent layer. -->
  <defs>
    <linearGradient id="sWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#caa978"/>
      <stop offset="1" stop-color="#9c7b45"/>
    </linearGradient>
    <linearGradient id="sRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8d7b53"/>
      <stop offset="1" stop-color="#5f4f30"/>
    </linearGradient>
  </defs>
  <ellipse cx="50" cy="93" rx="36" ry="5" fill="#000000" opacity="0.18"/>
  <!-- back wall / interior -->
  <rect x="20" y="46" width="60" height="46" rx="2" fill="url(#sWall)"/>
  <rect x="20" y="46" width="60" height="46" rx="2" fill="#000000" opacity="0.12"/>
  <!-- support posts -->
  <rect x="22" y="50" width="6" height="42" fill="#6e562f"/>
  <rect x="72" y="50" width="6" height="42" fill="#6e562f"/>
  <!-- wide low roof with overhang -->
  <polygon points="12,52 50,28 88,52" fill="url(#sRoof)"/>
  <polygon points="50,28 88,52 50,52" fill="#000000" opacity="0.12"/>
  <rect x="12" y="50" width="76" height="6" rx="2" fill="#4d3f26"/>
  <!-- ridge pole for the pennant -->
  <rect x="49" y="16" width="2.4" height="13" fill="#7b7363"/>
  <!-- stacked crates -->
  <rect x="32" y="66" width="18" height="18" rx="1.5" fill="#b3884f"/>
  <path d="M32 75 L50 75 M41 66 L41 84" stroke="#6e4d27" stroke-width="1.6"/>
  <rect x="52" y="70" width="14" height="14" rx="1.5" fill="#a07a45"/>
  <path d="M52 77 L66 77 M59 70 L59 84" stroke="#664a26" stroke-width="1.4"/>
  <!-- a sack -->
  <path d="M30 84 Q28 70 36 70 Q44 70 42 84 Z" fill="#cbb892"/>
  <path d="M33 70 Q36 67 39 70" stroke="#8a795a" stroke-width="1.4" fill="none"/>
</svg>
