<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Neutral base (timber + iron). Pennant is a separate accent layer. -->
  <defs>
    <linearGradient id="rLog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9763f"/>
      <stop offset="1" stop-color="#7c5026"/>
    </linearGradient>
    <linearGradient id="rFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a5a2b"/>
      <stop offset="1" stop-color="#5f3c19"/>
    </linearGradient>
    <radialGradient id="rHead" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#cdd4db"/>
      <stop offset="1" stop-color="#7d858d"/>
    </radialGradient>
    <linearGradient id="rRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a6b39"/>
      <stop offset="1" stop-color="#6d4622"/>
    </linearGradient>
  </defs>
  <ellipse cx="50" cy="90" rx="40" ry="6" fill="#000000" opacity="0.2"/>
  <!-- wheels -->
  <circle cx="28" cy="80" r="11" fill="#3a2a18"/>
  <circle cx="28" cy="80" r="4" fill="#6d4622"/>
  <circle cx="72" cy="80" r="11" fill="#3a2a18"/>
  <circle cx="72" cy="80" r="4" fill="#6d4622"/>
  <!-- A-frame supports -->
  <rect x="24" y="40" width="6" height="40" rx="2" fill="url(#rFrame)" transform="rotate(8 27 60)"/>
  <rect x="70" y="40" width="6" height="40" rx="2" fill="url(#rFrame)" transform="rotate(-8 73 60)"/>
  <!-- protective roof -->
  <path d="M18 40 L82 40 L74 30 L26 30 Z" fill="url(#rRoof)"/>
  <rect x="18" y="38" width="64" height="5" rx="2" fill="#000000" opacity="0.18"/>
  <!-- the ram log (suspended), iron head to the left -->
  <rect x="20" y="52" width="60" height="12" rx="6" fill="url(#rLog)"/>
  <rect x="20" y="52" width="60" height="4" rx="2" fill="#ffffff" opacity="0.12"/>
  <!-- iron banded head -->
  <path d="M12 58 q-2 -8 8 -8 l4 0 l0 16 l-4 0 q-10 0 -8 -8Z" fill="url(#rHead)"/>
  <rect x="30" y="52" width="4" height="12" fill="#000000" opacity="0.22"/>
  <rect x="48" y="52" width="4" height="12" fill="#000000" opacity="0.22"/>
  <!-- suspension ropes -->
  <line x1="35" y1="44" x2="35" y2="52" stroke="#000000" stroke-opacity="0.3" stroke-width="2"/>
  <line x1="65" y1="44" x2="65" y2="52" stroke="#000000" stroke-opacity="0.3" stroke-width="2"/>
</svg>
