<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Auto-tile wall: a straight run. Edge-to-edge so neighbours touch.
       Default E–W; the renderer rotates 90° for a N–S run, ±45° for diagonals. -->
  <defs>
    <linearGradient id="wS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa0a6"/>
      <stop offset="1" stop-color="#646a70"/>
    </linearGradient>
  </defs>
  <rect x="0" y="28" width="100" height="44" fill="url(#wS)"/>
  <rect x="0" y="28" width="100" height="7" fill="#b5bbc1"/>
  <rect x="0" y="65" width="100" height="7" fill="#000000" opacity="0.12"/>
  <g stroke="#4c5257" stroke-width="2" opacity="0.5">
    <line x1="0" y1="50" x2="100" y2="50"/>
    <line x1="17" y1="35" x2="17" y2="65"/>
    <line x1="50" y1="35" x2="50" y2="65"/>
    <line x1="83" y1="35" x2="83" y2="65"/>
  </g>
</svg>
