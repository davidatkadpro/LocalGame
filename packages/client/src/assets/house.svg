<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Neutral base (timber + roof). Pennant is a separate accent layer. -->
  <defs>
    <linearGradient id="hWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d2b483"/>
      <stop offset="1" stop-color="#a8854f"/>
    </linearGradient>
    <linearGradient id="hRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a6633"/>
      <stop offset="1" stop-color="#6e4420"/>
    </linearGradient>
  </defs>
  <ellipse cx="50" cy="93" rx="34" ry="5" fill="#000000" opacity="0.18"/>
  <!-- chimney -->
  <rect x="64" y="28" width="12" height="22" rx="1" fill="#b7b09c"/>
  <rect x="62" y="26" width="16" height="6" rx="1" fill="#000000" opacity="0.2"/>
  <!-- walls -->
  <rect x="22" y="50" width="56" height="42" rx="2" fill="url(#hWall)"/>
  <!-- roof -->
  <polygon points="14,54 50,22 86,54" fill="url(#hRoof)"/>
  <polygon points="50,22 86,54 50,54" fill="#000000" opacity="0.12"/>
  <!-- ridge pole for pennant -->
  <rect x="49" y="10" width="2.4" height="13" fill="#7b7363"/>
  <!-- door -->
  <path d="M44 92 L44 70 Q51 62 58 70 L58 92 Z" fill="#3a2a18" opacity="0.55"/>
  <circle cx="55" cy="80" r="1.6" fill="#ffe9b8" opacity="0.7"/>
  <!-- window -->
  <rect x="27" y="58" width="13" height="13" rx="2" fill="#3a2a18" opacity="0.4"/>
  <path d="M33.5 58 L33.5 71 M27 64.5 L40 64.5" stroke="#ffe9b8" stroke-opacity="0.4" stroke-width="1.4"/>
</svg>
