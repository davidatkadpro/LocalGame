<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Neutral base: a grand domed monument. Banner is a separate accent layer. -->
  <defs>
    <linearGradient id="wWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ece7d8"/>
      <stop offset="1" stop-color="#b8b09a"/>
    </linearGradient>
    <radialGradient id="wDome" cx="0.4" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="0.6" stop-color="#e8b53e"/>
      <stop offset="1" stop-color="#b5841f"/>
    </radialGradient>
  </defs>
  <ellipse cx="50" cy="95" rx="46" ry="5" fill="#000000" opacity="0.18"/>
  <!-- flanking spires -->
  <rect x="8" y="40" width="14" height="52" rx="2" fill="url(#wWall)"/>
  <rect x="78" y="40" width="14" height="52" rx="2" fill="url(#wWall)"/>
  <polygon points="8,40 15,26 22,40" fill="url(#wDome)"/>
  <polygon points="78,40 85,26 92,40" fill="url(#wDome)"/>
  <!-- main hall -->
  <rect x="24" y="48" width="52" height="44" rx="3" fill="url(#wWall)"/>
  <!-- grand dome -->
  <path d="M26 52 Q50 12 74 52 Z" fill="url(#wDome)"/>
  <path d="M50 12 Q74 52 50 52 Z" fill="#000000" opacity="0.10"/>
  <!-- dome finial / pole (the banner sits here, in the accent layer) -->
  <rect x="48.5" y="6" width="3" height="12" fill="#7b7363"/>
  <circle cx="50" cy="7" r="3.2" fill="url(#wDome)"/>
  <!-- columned facade -->
  <rect x="30" y="60" width="6" height="32" fill="#000000" opacity="0.10"/>
  <rect x="46" y="60" width="6" height="32" fill="#000000" opacity="0.10"/>
  <rect x="62" y="60" width="6" height="32" fill="#000000" opacity="0.10"/>
  <!-- grand door -->
  <path d="M42 92 L42 68 Q50 58 58 68 L58 92 Z" fill="#3a2a18" opacity="0.55"/>
  <rect x="24" y="86" width="52" height="6" fill="#000000" opacity="0.12"/>
</svg>
