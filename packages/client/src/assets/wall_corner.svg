<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Auto-tile wall: an L-corner joining two adjacent sides. Default E + S;
       the renderer rotates it to the other three corners. -->
  <defs>
    <linearGradient id="wS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa0a6"/>
      <stop offset="1" stop-color="#646a70"/>
    </linearGradient>
  </defs>
  <!-- east arm + south arm, overlapping at the hub -->
  <rect x="28" y="28" width="72" height="44" fill="url(#wS)"/>
  <rect x="28" y="28" width="44" height="72" fill="url(#wS)"/>
  <!-- light along the outer top/left edges -->
  <rect x="28" y="28" width="72" height="7" fill="#b5bbc1"/>
  <rect x="28" y="28" width="7" height="72" fill="#b5bbc1"/>
  <g stroke="#4c5257" stroke-width="2" opacity="0.45">
    <line x1="72" y1="50" x2="100" y2="50"/>
    <line x1="50" y1="72" x2="50" y2="100"/>
    <line x1="50" y1="40" x2="50" y2="50"/>
    <line x1="50" y1="50" x2="60" y2="50"/>
  </g>
</svg>
