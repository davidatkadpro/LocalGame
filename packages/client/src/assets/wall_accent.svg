<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Team-colour accent: tinted with the player's colour. -->
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cccccc"/>
    </linearGradient>
  </defs>
  <!-- a thin team-colour band along the top course -->
  <rect x="16" y="34" width="68" height="4" fill="url(#acc)"/>
</svg>
